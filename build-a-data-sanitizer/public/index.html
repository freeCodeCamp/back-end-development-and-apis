<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Sanitizer Form</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f2f7fb;
        color: #1a232b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
      }

      .page-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .form-card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(31, 48, 77, 0.08);
        padding: 2rem;
      }

      .form-card h1 {
        margin: 0 0 0.75rem;
        font-size: 1.9rem;
        letter-spacing: -0.02em;
      }

      .form-card p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
        color: #536172;
      }

      .field-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #d8e2ec;
        border-radius: 10px;
        padding: 0.95rem 1rem;
        font-size: 1rem;
        line-height: 1.5;
        background: #f9fbff;
        color: #1a232b;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      .hint {
        margin-top: 0.35rem;
        color: #718096;
        font-size: 0.92rem;
      }

      .button-row {
        display: flex;
        justify-content: flex-end;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.95rem 1.5rem;
        font-size: 1rem;
        background: #284bff;
        color: #ffffff;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      button:hover,
      button:focus {
        background: #1b40d4;
        transform: translateY(-1px);
        outline: none;
      }

      .message {
        border-radius: 12px;
        padding: 1rem 1.1rem;
        margin-bottom: 1.25rem;
        background: #fff3f0;
        color: #922b21;
        border: 1px solid #fac8c3;
      }

      .footer {
        margin-top: 1.5rem;
        font-size: 0.92rem;
        color: #718096;
        text-align: center;
      }

      .footer a {
        color: #284bff;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <main class="form-card">
        <h1>Submit Your Comment</h1>
        <p>
          Enter a username and comment. The form will sanitize your input before
          the server responds.
        </p>

        <div id="errorMessage" class="message" hidden>
          <strong>Error:</strong> <span id="errorText"></span>
        </div>

        <form action="/submit" method="POST">
          <div class="field-group">
            <label for="username">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="Enter your username"
              required
              minlength="3"
            />
            <p class="hint">Usernames should be at least 3 characters long.</p>
          </div>

          <div class="field-group">
            <label for="comment">Comment</label>
            <textarea
              id="comment"
              name="comment"
              placeholder="Write your comment here"
            ></textarea>
            <p class="hint">HTML tags will be removed from comments.</p>
          </div>

          <div class="button-row">
            <button type="submit">Send Comment</button>
          </div>
        </form>

        <div class="footer">
          <p>Built for the Data Sanitizer project.</p>
        </div>
      </main>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const error = params.get("error");
      if (error) {
        const errorMessage = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        errorText.textContent = decodeURIComponent(error);
        errorMessage.hidden = false;
      }
    </script>
  </body>
</html>
